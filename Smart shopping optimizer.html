<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Shopping Optimizer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    .item-box {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      background: #fafafa;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #e9ffe9;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Smart Shopping Optimizer</h1>

  <label>Budget</label>
  <input type="number" id="budget" placeholder="Enter Budget">

  <label>Item Name</label>
  <input type="text" id="itemName" placeholder="Enter Item Name">

  <label>Price</label>
  <input type="number" id="itemPrice" placeholder="Enter Price">

  <label>Value</label>
  <input type="number" id="itemValue" placeholder="Enter Value Score">

  <button onclick="addItem()">Add Item</button>

  <div id="items"></div>

  <button onclick="optimizeShopping()">Optimize Shopping</button>

  <div id="result"></div>

</div>

<script>

let items = [];

function addItem() {

  const name = document.getElementById("itemName").value;
  const price = parseInt(document.getElementById("itemPrice").value);
  const value = parseInt(document.getElementById("itemValue").value);

  if (!name || !price || !value) {
    alert("Please fill all fields");
    return;
  }

  items.push({ name, price, value });

  displayItems();

  document.getElementById("itemName").value = "";
  document.getElementById("itemPrice").value = "";
  document.getElementById("itemValue").value = "";
}

function displayItems() {

  const itemsDiv = document.getElementById("items");

  itemsDiv.innerHTML = "";

  items.forEach((item, index) => {

    itemsDiv.innerHTML += `
      <div class="item-box">
        <strong>${item.name}</strong><br>
        Price: ₹${item.price}<br>
        Value: ${item.value}
      </div>
    `;
  });
}

function optimizeShopping() {

  const budget = parseInt(document.getElementById("budget").value);

  if (!budget) {
    alert("Enter budget");
    return;
  }

  const n = items.length;

  let dp = Array(n + 1).fill().map(() =>
    Array(budget + 1).fill(0)
  );

  for (let i = 1; i <= n; i++) {

    for (let w = 0; w <= budget; w++) {

      if (items[i - 1].price <= w) {

        dp[i][w] = Math.max(
          items[i - 1].value +
          dp[i - 1][w - items[i - 1].price],

          dp[i - 1][w]
        );

      } else {

        dp[i][w] = dp[i - 1][w];
      }
    }
  }

  let w = budget;
  let selectedItems = [];

  for (let i = n; i > 0; i--) {

    if (dp[i][w] !== dp[i - 1][w]) {

      selectedItems.push(items[i - 1]);

      w -= items[i - 1].price;
    }
  }

  let resultHTML = `
    <h2>Optimized Result</h2>
    <strong>Maximum Value:</strong> ${dp[n][budget]}<br><br>
    <strong>Recommended Items:</strong><br>
  `;

  selectedItems.reverse().forEach(item => {

    resultHTML += `
      ${item.name} - ₹${item.price} (Value: ${item.value})<br>
    `;
  });

  document.getElementById("result").innerHTML = resultHTML;
}

</script>

</body>
</html>
